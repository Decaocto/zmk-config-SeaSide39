manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-pmw3610-driver
      # 実在するリポジトリとタグ(v0.3.0)を直接指定。Pillbug衝突も起きません。
      url: https://github.com/inorichi/zmk-pmw3610-driver
      revision: v0.3.0
    - name: zmk-rgbled-widget
      # 実在するリポジトリ。ZMK Studio対応版です。
      url: https://github.com/caksoylar/zmk-rgbled-widget
      revision: main
  self:
    path: config
