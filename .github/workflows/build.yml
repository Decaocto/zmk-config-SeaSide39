name: Build
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      # === ここで「Pillbug重複エラー」の元凶を削除します ===
      - name: Remove conflicting board folder
        run: rm -rf zmk-pmw3610-driver/boards

      - name: Build ZMK
        uses: zmkfirmware/zmk-build-action@v2
        with:
          config_path: config
          build_matrix_path: build.yaml
          # ZMK Studioを有効にするために最新のZMK本体を使用
          repository: zmkfirmware/zmk
          branch: main
