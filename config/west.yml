manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: inorichi
      url-base: https://github.com/inorichi
    - name: caksoylar
      url-base: https://github.com/caksoylar
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main  # 最新のZMK Studio対応版を使用
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: inorichi
      # ここを zmk-v0.3 にすることで、Pillbugボードの衝突エラーを回避します
      revision: zmk-v0.3
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
  self:
    path: config
