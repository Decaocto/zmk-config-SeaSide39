manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-pmw3610-driver
      # 直接URLを指定することで認証エラーを回避し、かつPillbugの衝突がない版を使用します
      url: https://github.com/badumbatish/zmk-pmw3610-driver
      revision: main
    - name: zmk-rgbled-widget
      url: https://github.com/caksoylar/zmk-rgbled-widget
      revision: main
  self:
    path: config
