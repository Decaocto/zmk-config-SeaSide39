on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ZMK Firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml', '**/build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      # === ここにパッチを挿入しました ===
      - name: Patch RGBLED Widget for ZMK Studio
        run: |
          # 最新のZMK APIに合わせてウィジェットのソースコードを自動修正します
          WIDGET_FILE="modules/lib/zmk-rgbled-widget/src/widget.c"
          if [ -f "$WIDGET_FILE" ]; then
            sed -i 's/zmk_endpoint_get_selected().transport/zmk_endpoints_selected()/g' "$WIDGET_FILE"
            sed -i 's/ZMK_TRANSPORT_USB/ZMK_ENDPOINT_USB/g' "$WIDGET_FILE"
            sed -i 's/ZMK_TRANSPORT_BLE/ZMK_ENDPOINT_BLE/g' "$WIDGET_FILE"
            echo "Patch applied successfully."
          else
            echo "Widget file not found at $WIDGET_FILE, skipping patch."
          fi

      - name: Build ZMK
        uses: zmkfirmware/zmk-build-action@v2
        with:
          repository: zmkfirmware/zmk
          # ZMK Studioを使うために最新のメインブランチを使用
          branch: main
          config_path: config
          fallback_binary: zephyr.uf2
          # build.yaml を読み込んでビルドする設定
          build_matrix_path: build.yaml
